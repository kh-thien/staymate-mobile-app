name: stay_mate
description: "Stay Mate – An mobile app for tenants to monitor and manage their rental rooms."
publish_to: "none"
version: 1.0.15+15

environment:
  sdk: ^3.8.1

dependencies:
  cached_network_image: ^3.3.0
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.0.10
  freezed_annotation: ^3.1.0
  get_it: ^9.1.0
  go_router: ^17.0.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  http: ^1.2.1
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  photo_view: ^0.15.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  file_picker: ^10.3.7
  image: ^4.3.0
  supabase_flutter: ^2.10.2
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2
  hooks_riverpod: ^3.0.2
  flutter_hooks: ^0.21.3
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  device_info_plus: ^12.2.0
  connectivity_plus: ^7.0.0
  in_app_update: ^4.2.5
  font_awesome_flutter: ^10.7.0
  flutter_launcher_icons: ^0.14.4
  shimmer: ^3.0.0
  liquid_glass_renderer: ^0.2.0-dev.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  json_serializable: ^6.11.1
  mockito: ^5.4.4
  freezed: ^3.2.3
  riverpod_generator: ^3.0.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - lib/core/assets/images/


#SPLASH SCREEN CONFIG
flutter_native_splash:
  android: true
  ios: true

  color: "#ffffff"
  image: lib/core/assets/images/logo_staymate.png

  color_dark: "#000000"
  image_dark: lib/core/assets/images/logo_staymate_dark_theme.png

  android_12:
    image: lib/core/assets/images/logo_staymate.png
    color: "#ffffff"
    image_dark: lib/core/assets/images/logo_staymate_dark_theme.png
    color_dark: "#000000"