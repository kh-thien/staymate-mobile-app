name: stay_mate
description: "Stay Mate – An mobile app for tenants to monitor and manage their rental rooms."
publish_to: "none"
version: 1.0.7+7

environment:
  sdk: ^3.8.1

dependencies:
  cached_network_image: ^3.3.0
  dartz: ^0.10.1
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.0.10
  freezed_annotation: ^3.1.0
  get_it: ^8.2.0
  go_router: ^16.2.4
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  photo_view: ^0.14.0
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  image: ^4.3.0
  supabase_flutter: ^2.10.2
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2
  hooks_riverpod: ^3.0.2
  flutter_hooks: ^0.21.3
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  device_info_plus: ^11.1.0
  connectivity_plus: ^6.0.5
  in_app_update: ^4.2.5
  font_awesome_flutter: ^10.7.0
  flutter_launcher_icons: ^0.14.4
  device_preview: ^1.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  json_serializable: ^6.11.1
  mockito: ^5.4.4
  freezed: ^3.2.3
  riverpod_generator: ^3.0.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - lib/core/assets/images/
  
  # CupertinoIcons không được sử dụng, nhưng có thể thêm để tránh warning
  # (không bắt buộc nếu không dùng CupertinoIcons)
